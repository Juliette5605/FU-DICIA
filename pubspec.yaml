name: fu_dicia
description: FU-DICIA – QR Code, Photos & Collecte sécurisée
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # QR Code Scanner
  mobile_scanner: ^5.2.3

  # Camera & Photos
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0

  # Stockage local
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  confetti: ^0.7.0
  vibration: ^3.1.8

  # Utilitaires
  intl: ^0.20.2
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  path: ^1.9.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/Logo.jpeg

flutter_icons:
  android: true
  ios: true
  image_path: assets/Logo.jpeg
  remove_alpha: false
