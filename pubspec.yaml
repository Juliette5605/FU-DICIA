name: fu_dicia
description: FU-DICIA — Système de Collecte Sécurisée
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # GPS & Localisation
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2

  # QR Code
  mobile_scanner: ^5.2.3

  # Caméra & Photos
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.1.7

  # Base de données locale
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Carte interactive
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Graphiques
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  vibration: ^3.1.8

  # Fonts & Design
  google_fonts: ^6.2.1

  # Formatage dates/nombres
  intl: ^0.19.0

  # Notifications locales
  flutter_local_notifications: ^17.2.3

  # Signature digitale
  signature: ^5.4.1

  # Shimmer loading
  shimmer: ^3.0.0

  # Text to speech
  flutter_tts: ^4.2.0

  # SMS SOS
  url_launcher: ^6.3.0

  # Partage fichiers
  share_plus: ^9.0.0

  # UUID
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Logo.jpeg
    - assets/app_icon.png